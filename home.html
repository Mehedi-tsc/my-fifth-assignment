<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>All</title>
    <!-- tailwind and daisyUI -->

    <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" type="text/css" />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>

    <!-- google font -->

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Geist:wght@100..900&display=swap" rel="stylesheet">

    <style>
        * {
            font-family: "Geist", sans-serif;
        }
    </style>
</head>

<body class="bg-[#F8FAFC]">
    <!-- navbar start -->
    <header>
        <div
            class="navbar bg-[#FFFFFF] shadow-sm flex flex-col gap-y-4 lg:flex-row lg:justify-between lg:items-center lg:px-16 py-5">
            <div class="flex gap-1 justify-between items-center">
                <div class="w-9 h-9">
                    <img src="assets/github-logo.png" alt="">
                </div>
                <h1 class="text-2xl font-semibold">GitHub Issues Tracker</h1>
            </div>
            <div class="flex gap-2">

                <!-- search box with icon start -->
                <label class="input">
                    <svg class="h-[1em] opacity-50" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24">
                        <g stroke-linejoin="round" stroke-linecap="round" stroke-width="2.5" fill="none"
                            stroke="currentColor">
                            <circle cx="11" cy="11" r="8"></circle>
                            <path d="m21 21-4.3-4.3"></path>
                        </g>
                    </svg>
                    <input id="search-input" type="search" required placeholder="Search issues..." />
                </label>
                <!-- Search box with icon End -->

                <div>
                    <button onclick="searchResult()" class="btn btn-primary flex gap-0 justify-between items-center w-30 p-4"><img
                            src="assets/Plus.png" alt=""><span class="font-semibold">New Issue</span></button>
                </div>
            </div>
        </div>
    </header>

    <main class="my-10 w-11/12 mx-auto space-y-2">

        <!-- 3 tab section start -->
        <section class="bg-[#FFFFFF] shadow-sm p-6 flex flex-col justify-center items-center lg:justify-start lg:items-start gap-3 lg:flex-row lg:gap-2">
            <button id="allBtn" class="btn btn-primary w-28 font-semibold">All</button>
            <button id="openBtn" class="btn w-28 font-semibold text-[#64748B]">Open</button>
            <button id="closedBtn" class="btn w-28 font-semibold text-[#64748B]">Closed</button>
        </section>
        <!-- 3 tab section End -->

        <!-- below the 3 tab section start -->

        <section class="bg-[#FFFFFF] shadow-sm p-6 flex  flex-col space-y-3 lg:flex-row lg:justify-between lg:items-center">
            <div class="left flex flex-col text-center lg:text-left lg:flex-row gap-2 justify-between items-center">
                <div class="img">
                    <img src="assets/Aperture.png" alt="">
                </div>
                <div class="text">
                    <h3 class="font-semibold text-xl"><span id="count-all">0</span> Issues</h3>
                    <p class="text-[#64748B]">Track and manage your project issues</p>
                </div>
            </div>
            <div class="rirht flex gap-3 justify-center items-center">
                <div class="open flex justify-center items-center gap-1">
                    <div class="w-3 h-3 bg-[#00A96E] rounded-full"></div>
                    <div>
                        <p class="font-medium">Open</p>
                    </div>
                </div>
                <div class="open flex justify-center items-center gap-1">
                    <div class="w-3 h-3 bg-[#A855F7] rounded-full"></div>
                    <div>
                        <p class="font-medium">Closed</p>
                    </div>
                </div>
            </div>
        </section>
        <!-- below the 3 tab section End-->

        <!-- all issue section startrd -->
        <section>
            <div id="loading-spinner" class="justify-center hidden">
                <span class="loading loading-spinner loading-xl"></span>
            </div>
            
            <div id="all-card-container" class="parent grid grid-cols-1 lg:grid-cols-4 gap-2">
               <!-- all card load here from js -->
        
            </div>
            
        </section>

        <!-- Open the modal using ID.showModal() method -->
<!-- <button class="btn" onclick="my_modal_1.showModal()">open modal</button> -->
<dialog id="my_modal_1" class="modal">
  <div class="modal-box">
            <div class="space-y-2">
                <h2 id="modal-title" class="font-bold text-2xl"></h2>
                <div class="flex justify-start items-center gap-2">
                    <div id="modal-status" class= ""></div>
                    <div class="w-1 h-1 rounded-full bg-[#64748B]"></div>
                    <p class="text-xs text-[#64748B]">Opened by <span id="modal-name"></span></p>
                    <div class="w-1 h-1 rounded-full bg-[#64748B]"></div>
                    <p id="modal-date" class="text-xs text-[#64748B]"></p>
                </div> 
                <div>
                        <div id="modal-left-badge" class="badge badge-success mb-1">
                             
                        </div>
                        <div id="modal-right-badge" class="">
                             
                        </div>
                    
                    </div>
                    <p id="modal-description" class="text-[#64748B] my-2"></p>
                    <div class="bg-[#F8FAFC] p-3 flex justify-start gap-35">
                        <div>
                            <p class="text-[#64748B]">Assignee:</p>
                            <p id="modal-name-2"></p>
                        </div>
                        <div>
                            <p class="text-[#64748B]">Priority:</p>
                            <div id="modal-priority"></div>
                        </div>
                    </div>
            </div>
    <div class="modal-action">
      <form method="dialog">
        <!-- if there is a button in form, it will close the modal -->
        <button class="btn">Close</button>
      </form>
    </div>
  </div>
</dialog>

    </main>
<script src="home.js"></script>
</body>

</html>
