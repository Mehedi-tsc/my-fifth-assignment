<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>All</title>
    <!-- tailwind and daisyUI -->

    <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" type="text/css" />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>

    <!-- google font -->

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Geist:wght@100..900&display=swap" rel="stylesheet">

    <style>
        * {
            font-family: "Geist", sans-serif;
        }
    </style>
</head>

<body class="bg-[#F8FAFC]">
    <!-- navbar start -->
    <header>
        <div class="navbar bg-[#FFFFFF] shadow-sm flex flex-col gap-y-4 lg:flex-row lg:justify-between lg:items-center lg:px-16 py-5">
            <div class="flex gap-1 justify-between items-center">
                <div class="w-9 h-9">
                    <img src="assets/github-logo.png" alt="">
                </div>
                <h1 class="text-2xl font-semibold">GitHub Issues Tracker</h1>
            </div>
            <div class="flex gap-2">

                <!-- search box with icon start -->
                <label class="input">
                    <svg class="h-[1em] opacity-50" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24">
                        <g stroke-linejoin="round" stroke-linecap="round" stroke-width="2.5" fill="none"
                            stroke="currentColor">
                            <circle cx="11" cy="11" r="8"></circle>
                            <path d="m21 21-4.3-4.3"></path>
                        </g>
                    </svg>
                    <input type="search" required placeholder="Search issues..." />
                </label>
                <!-- Search box with icon End -->
                
                <div>
                    <button class="btn btn-primary flex gap-0 justify-between items-center w-30 p-4"><img src="assets/Plus.png" alt=""><span class="font-semibold">New Issue</span></button>
                </div>
            </div>
        </div>
    </header>

</body>

</html>
